<header class="mb-5">
    <div id="schoolCarousel"
         class="carousel slide carousel-fade"
         data-bs-ride="carousel"
         data-bs-interval="3000"
         data-bs-pause="false">

        <!-- indikator -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#schoolCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#schoolCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#schoolCarousel" data-bs-slide-to="2"></button>
        </div>

        <!-- isi carousel -->
        <div class="carousel-inner">

            <!-- slide 1 -->
            <div class="carousel-item active">
                <img src="images/sekolah.jpg"
                     class="d-block w-100"
                     alt="Welcome">

                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 p-3 rounded">
                    <h1 class="fw-bold">SDN 165 Tanjung Jabung Barat</h1>

                    <p class="fs-5">
                        Producing a Superior Generation with Noble Character and Environmental Perspective.
                    </p>

                    <a href="#"
                       class="btn btn-warning btn-lg fw-bold mt-2">
                        Register Now!
                        <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>

            <!-- slide 2 -->
            <div class="carousel-item">
                <img src="images/sekolah2.jpg"
                     class="d-block w-100"
                     alt="Fasilitas">

                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 p-3 rounded">
                    <h3>Best Learning Facilities</h3>
                    <p>Comfortable and modern classrooms.</p>
                </div>
            </div>

            <!-- slide 3 -->
            <div class="carousel-item">
                <img src="images/sekolah3.jpg"
                     class="d-block w-100"
                     alt="Prestasi">

                <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 p-3 rounded">
                    <h3>Academic & Non-Academic Achievements</h3>
                    <p>Achieve success with dedicated teachers.</p>
                </div>
            </div>

        </div>

        <!-- tombol prev -->
        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#schoolCarousel"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>
        </button>

        <!-- tombol next -->
        <button class="carousel-control-next"
                type="button"
                data-bs-target="#schoolCarousel"
                data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
</header>
